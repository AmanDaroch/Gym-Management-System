<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FitLife Gym</title>

    <link rel="stylesheet" href="dashboard.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="sidebar">

        <h2>FITLIFE</h2>

        <ul>

            <li class="active">
                <a href="dashboard.html">
                    <i class="fa fa-home"></i> Dashboard
                </a>
            </li>

            <li>
                <a href="members.html">
                    <i class="fa fa-users"></i> Members
                </a>
            </li>

            <li>
                <a href="trainers.html">
                    <i class="fa fa-dumbbell"></i> Trainers
                </a>
            </li>

            <li>
                <a href="attendance.html">
                    <i class="fa fa-calendar-check"></i> Attendance
                </a>
            </li>

            <li>
                <a href="payments.html">
                    <i class="fa fa-money-bill"></i> Payments
                </a>
            </li>

            <li>
                <a href="workout.html">
                    <i class="fa fa-heartbeat"></i> Workout
                </a>
            </li>

            <li>
                <a href="diet.html">
                    <i class="fa fa-apple-whole"></i> Diet Plans
                </a>
            </li>

            <li>
                <a href="reports.html">
                    <i class="fa fa-chart-column"></i> Reports
                </a>
            </li>

            <li>
                <a href="index.html">
                    <i class="fa fa-right-from-bracket"></i> Logout
                </a>
            </li>

        </ul>

    </div>

    <div class="main">

        <div class="topbar">

            <h1>Dashboard</h1>

            <div class="admin">
                <i class="fa fa-user-circle"></i>
                Administrator
            </div>

        </div>

        <div class="cards">

            <div class="card">
                <i class="fa fa-users"></i>
                <h2 id="members">150</h2>
                <p>Total Members</p>
            </div>

            <div class="card">
                <i class="fa fa-user-check"></i>
                <h2>120</h2>
                <p>Active Members</p>
            </div>

            <div class="card">
                <i class="fa fa-dumbbell"></i>
                <h2>8</h2>
                <p>Trainers</p>
            </div>

            <div class="card">
                <i class="fa fa-indian-rupee-sign"></i>
                <h2>₹1,25,000</h2>
                <p>Monthly Revenue</p>
            </div>

        </div>

        <div class="chartBox">

            <canvas id="gymChart"></canvas>

        </div>

    </div>

    <script src="dashboard.js"></script>

</body>

</html>
